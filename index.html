# TeamFlow Frontend (HTML + CSS + JavaScript)

Save this as `index.html`

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeamFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
    color:white;
}

:root{
    --primary:#3b82f6;
    --secondary:#1e293b;
    --card:#111827;
    --border:#334155;
    --success:#22c55e;
    --warning:#f59e0b;
    --danger:#ef4444;
}

.hidden{
    display:none !important;
}

button{
    cursor:pointer;
}

input,textarea,select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#0f172a;
    color:white;
    margin-top:6px;
}

.auth-container{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.auth-box{
    width:400px;
    background:var(--card);
    padding:30px;
    border-radius:20px;
    border:1px solid var(--border);
}

.logo{
    font-size:32px;
    font-weight:700;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

.btn{
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-danger{
    background:var(--danger);
    color:white;
}

.btn-success{
    background:var(--success);
    color:white;
}

.btn-secondary{
    background:var(--secondary);
    color:white;
    border:1px solid var(--border);
}

.main-layout{
    display:flex;
}

.sidebar{
    width:260px;
    min-height:100vh;
    background:#111827;
    border-right:1px solid var(--border);
    padding:20px;
}

.sidebar h2{
    margin-bottom:30px;
}

.nav-btn{
    width:100%;
    text-align:left;
    padding:14px;
    background:transparent;
    border:none;
    color:white;
    margin-bottom:10px;
    border-radius:10px;
}

.nav-btn:hover{
    background:#1e293b;
}

.content{
    flex:1;
    padding:30px;
}

.page-title{
    font-size:30px;
    margin-bottom:20px;
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:16px;
    border:1px solid var(--border);
}

.stat-number{
    font-size:40px;
    font-weight:700;
    margin-top:10px;
}

.table-container{
    overflow-x:auto;
}

.table{
    width:100%;
    border-collapse:collapse;
}

.table th,
.table td{
    padding:16px;
    border-bottom:1px solid var(--border);
    text-align:left;
}

.badge{
    padding:6px 12px;
    border-radius:30px;
    font-size:12px;
    font-weight:600;
}

.todo{
    background:#475569;
}

.progress{
    background:var(--warning);
    color:black;
}

.done{
    background:var(--success);
}

.overdue{
    background:var(--danger);
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:500px;
    background:var(--card);
    padding:30px;
    border-radius:20px;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:20px;
}

.flex-between{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.mb-20{
    margin-bottom:20px;
}

.mt-20{
    margin-top:20px;
}

</style>
</head>
<body>

<div id="authSection" class="auth-container">
    <div class="auth-box">
        <div class="logo">TeamFlow</div>
        <div class="subtitle">Team Task Manager</div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" />
        </div>

        <button class="btn btn-primary" style="width:100%" onclick="login()">
            Login
        </button>

        <div id="loginError" style="margin-top:15px;color:#ef4444"></div>
    </div>
</div>

<div id="appSection" class="main-layout hidden">

    <div class="sidebar">
        <h2>TeamFlow</h2>

        <button class="nav-btn" onclick="showPage('dashboardPage')">
            Dashboard
        </button>

        <button class="nav-btn" onclick="showPage('projectsPage')">
            Projects
        </button>

        <button class="nav-btn" onclick="showPage('tasksPage')">
            Tasks
        </button>

        <button id="membersBtn" class="nav-btn hidden" onclick="showPage('membersPage')">
            Members
        </button>

        <button class="nav-btn" onclick="logout()">
            Logout
        </button>
    </div>

    <div class="content">

        <div id="dashboardPage">
            <div class="page-title">Dashboard</div>

            <div class="stats-grid">
                <div class="card">
                    <div>Total Tasks</div>
                    <div class="stat-number" id="totalTasks">0</div>
                </div>

                <div class="card">
                    <div>Todo</div>
                    <div class="stat-number" id="todoTasks">0</div>
                </div>

                <div class="card">
                    <div>In Progress</div>
                    <div class="stat-number" id="progressTasks">0</div>
                </div>

                <div class="card">
                    <div>Done</div>
                    <div class="stat-number" id="doneTasks">0</div>
                </div>
            </div>
        </div>

        <div id="projectsPage" class="hidden">
            <div class="flex-between mb-20">
                <div class="page-title">Projects</div>

                <button id="createProjectBtn" class="btn btn-primary hidden" onclick="openProjectModal()">
                    Create Project
                </button>
            </div>

            <div class="card table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="projectsTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tasksPage" class="hidden">
            <div class="page-title">Tasks</div>

            <div class="card table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Status</th>
                            <th>Due Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="tasksTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="membersPage" class="hidden">
            <div class="page-title">Members</div>

            <div class="card">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="employeeName" />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="employeeEmail" />
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="employeePassword" />
                </div>

                <button class="btn btn-primary" onclick="createEmployee()">
                    Create Employee
                </button>
            </div>
        </div>

    </div>

</div>

<div id="projectModal" class="modal hidden">
    <div class="modal-content">
        <h2>Create Project</h2>

        <div class="form-group mt-20">
            <label>Name</label>
            <input type="text" id="projectName" />
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="projectDescription"></textarea>
        </div>

        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeProjectModal()">
                Cancel
            </button>

            <button class="btn btn-primary" onclick="createProject()">
                Create
            </button>
        </div>
    </div>
</div>

<script>

const API_BASE = "https://YOUR_BACKEND_URL.up.railway.app";

function getToken(){
    return localStorage.getItem("token");
}

async function api(endpoint,method="GET",body=null){

    const options = {
        method,
        headers:{
            "Content-Type":"application/json"
        }
    };

    const token = getToken();

    if(token){
        options.headers.Authorization = `Bearer ${token}`;
    }

    if(body){
        options.body = JSON.stringify(body);
    }

    const response = await fetch(API_BASE + endpoint, options);

    return response.json();
}

async function login(){

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const response = await api("/login","POST",{
        email,
        password
    });

    if(response.token){

        localStorage.setItem("token",response.token);

        if(response.role){
            localStorage.setItem("role",response.role);
        }

        initApp();

    }else{
        document.getElementById("loginError").innerText = response.message || "Login failed";
    }
}

function logout(){
    localStorage.clear();
    location.reload();
}

function showPage(pageId){

    const pages = [
        "dashboardPage",
        "projectsPage",
        "tasksPage",
        "membersPage"
    ];

    pages.forEach(page=>{
        document.getElementById(page).classList.add("hidden");
    });

    document.getElementById(pageId).classList.remove("hidden");
}

async function loadDashboard(){

    const response = await api("/dashboard");

    if(!response.data){
        return;
    }

    const data = response.data;

    document.getElementById("totalTasks").innerText = data.my_tasks;
    document.getElementById("todoTasks").innerText = data.todo;
    document.getElementById("progressTasks").innerText = data.in_progress;
    document.getElementById("doneTasks").innerText = data.done;
}

async function loadProjects(){

    const response = await api("/projects");

    const tbody = document.getElementById("projectsTableBody");

    tbody.innerHTML = "";

    if(!response.data){
        return;
    }

    response.data.forEach(project=>{

        tbody.innerHTML += `
            <tr>
                <td>${project.name}</td>
                <td>${project.description || '-'}</td>
                <td>
                    <button class="btn btn-secondary" onclick="viewProject('${project.id}')">
                        View
                    </button>
                </td>
            </tr>
        `;
    });
}

async function loadTasks(){

    const projectsResponse = await api("/projects");

    const tbody = document.getElementById("tasksTableBody");

    tbody.innerHTML = "";

    if(!projectsResponse.data){
        return;
    }

    for(const project of projectsResponse.data){

        const tasksResponse = await api(`/projects/${project.id}/tasks`);

        if(tasksResponse.data){

            tasksResponse.data.forEach(task=>{

                let badgeClass = "todo";

                if(task.status === "in_progress"){
                    badgeClass = "progress";
                }

                if(task.status === "done"){
                    badgeClass = "done";
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${task.title}</td>

                        <td>
                            <span class="badge ${badgeClass}">
                                ${task.status}
                            </span>
                        </td>

                        <td>
                            ${task.due_date || '-'}
                        </td>

                        <td>
                            <select onchange="updateTaskStatus('${task.id}',this.value)">
                                <option value="todo">Todo</option>
                                <option value="in_progress">In Progress</option>
                                <option value="done">Done</option>
                            </select>
                        </td>
                    </tr>
                `;
            });
        }
    }
}

async function updateTaskStatus(taskId,status){

    await api(`/tasks/${taskId}/status`,`PATCH`,{
        status
    });

    loadTasks();
    loadDashboard();
}

function openProjectModal(){
    document.getElementById("projectModal").classList.remove("hidden");
}

function closeProjectModal(){
    document.getElementById("projectModal").classList.add("hidden");
}

async function createProject(){

    const name = document.getElementById("projectName").value;
    const description = document.getElementById("projectDescription").value;

    const response = await api("/projects","POST",{
        name,
        description
    });

    if(response.project_id){
        alert("Project Created");
        closeProjectModal();
        loadProjects();
    }
}

async function createEmployee(){

    const name = document.getElementById("employeeName").value;
    const email = document.getElementById("employeeEmail").value;
    const password = document.getElementById("employeePassword").value;

    const response = await api("/register/employee","POST",{
        name,
        email,
        password
    });

    if(response.message){
        alert("Employee Created Successfully");
    }
}

async function viewProject(projectId){

    const response = await api(`/projects/${projectId}`);

    console.log(response);

    alert("Open console to see full project details response");
}

function initApp(){

    document.getElementById("authSection").classList.add("hidden");
    document.getElementById("appSection").classList.remove("hidden");

    const role = localStorage.getItem("role");

    if(role === "admin"){

        document.getElementById("membersBtn").classList.remove("hidden");

        document.getElementById("createProjectBtn").classList.remove("hidden");
    }

    loadDashboard();
    loadProjects();
    loadTasks();
}

window.onload = ()=>{

    const token = getToken();

    if(token){
        initApp();
    }
}

</script>

</body>
</html>
```
